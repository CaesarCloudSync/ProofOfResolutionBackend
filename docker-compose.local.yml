services:

  web:
    image: ${FULL_IMAGE}
    container_name: proofofresolution
    build:
      context: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: app.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/blockchain/chain || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - appnet

  test:
    build:
      context: .
    command: pytest -s -v --tb=short --no-header tests/
    env_file:
      - .env
    environment:
      DATABASE_URL: test.db
    depends_on:
      web:
        condition: service_healthy
    networks:
      - appnet

networks:
  appnet:
    driver: bridge